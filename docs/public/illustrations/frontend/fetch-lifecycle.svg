<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">Fetch 请求生命周期</title><desc id="desc">应用发起请求，浏览器通过网络层访问服务器，收到响应后检查状态码、解析数据，并分别处理成功、取消和异常情况。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:22px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="360" fill="#f8fafc"/><text x="60" y="50" class="t">一次 Fetch 请求从发起到处理结果</text><g class="b"><rect x="65" y="135" width="160" height="80" rx="12" fill="#e0f2fe" stroke="#0284c7"/><rect x="310" y="135" width="160" height="80" rx="12" fill="#ecfccb" stroke="#65a30d"/><rect x="555" y="135" width="160" height="80" rx="12" fill="#ffedd5" stroke="#ea580c"/><rect x="800" y="135" width="160" height="80" rx="12" fill="#ede9fe" stroke="#7c3aed"/><rect x="1045" y="135" width="110" height="80" rx="12" fill="#dcfce7" stroke="#16a34a"/></g><g class="a"><path d="M225 175h80"/><path d="M470 175h80"/><path d="M715 175h80"/><path d="M960 175h80"/></g><text x="101" y="167" class="t">发起请求</text><text x="91" y="194" class="s">fetch(url)</text><text x="343" y="167" class="t">网络传输</text><text x="337" y="194" class="s">请求与响应</text><text x="587" y="167" class="t">检查结果</text><text x="573" y="194" class="s">status / ok</text><text x="838" y="167" class="t">解析数据</text><text x="842" y="194" class="s">response.json()</text><text x="1060" y="167" class="t">更新</text><text x="1054" y="194" class="s">界面</text><path d="M635 215v65H330v-65" class="a"/><text x="350" y="315" class="s">网络失败、超时或取消：捕获异常，区分 AbortError，再决定是否重试</text></svg>
