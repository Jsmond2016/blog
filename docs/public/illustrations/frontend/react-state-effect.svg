<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">React 状态与副作用</title><desc id="desc">用户事件触发状态更新，React 重新渲染界面，提交到 DOM 后再运行 useEffect 中与外部系统同步的副作用。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:21px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="390" fill="#f8fafc"/><text x="55" y="50" class="t">React：状态驱动渲染，副作用在提交后同步外部系统</text><g class="b"><rect x="55" y="135" width="170" height="90" rx="14" fill="#e0f2fe" stroke="#0284c7"/><rect x="300" y="135" width="170" height="90" rx="14" fill="#ffedd5" stroke="#ea580c"/><rect x="545" y="135" width="170" height="90" rx="14" fill="#ede9fe" stroke="#7c3aed"/><rect x="790" y="135" width="170" height="90" rx="14" fill="#dcfce7" stroke="#16a34a"/><rect x="1035" y="135" width="110" height="90" rx="14" fill="#fee2e2" stroke="#ef4444"/></g><g class="a"><path d="M225 180h70"/><path d="M470 180h70"/><path d="M715 180h70"/><path d="M960 180h70"/></g><text x="91" y="170" class="t">用户事件</text><text x="80" y="200" class="s">点击、输入</text><text x="335" y="170" class="t">setState</text><text x="326" y="200" class="s">请求更新</text><text x="584" y="170" class="t">重新渲染</text><text x="584" y="200" class="s">计算 UI</text><text x="834" y="170" class="t">提交 DOM</text><text x="824" y="200" class="s">更新屏幕</text><text x="1050" y="170" class="t">Effect</text><text x="1044" y="200" class="s">订阅/请求</text><text x="55" y="300" class="s">派生数据在渲染时计算；只有同步网络、订阅、DOM API 等外部系统时才需要 useEffect。</text></svg>
