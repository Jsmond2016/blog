<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc"><title id="title">浏览器渲染流程</title><desc id="desc">HTML 和 CSS 分别构建 DOM 与 CSSOM，再生成渲染树，经历布局、绘制和合成后显示在屏幕上。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:22px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="360" fill="#f8fafc"/><text x="60" y="52" class="t">浏览器如何把代码变成画面</text><g class="b"><rect x="60" y="135" width="145" height="80" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/><rect x="285" y="135" width="160" height="80" rx="12" fill="#ecfccb" stroke="#65a30d"/><rect x="525" y="135" width="145" height="80" rx="12" fill="#ffedd5" stroke="#f97316"/><rect x="750" y="135" width="145" height="80" rx="12" fill="#fee2e2" stroke="#ef4444"/><rect x="975" y="135" width="145" height="80" rx="12" fill="#dbeafe" stroke="#2563eb"/></g><g class="a"><path d="M205 175h75"/><path d="M445 175h75"/><path d="M670 175h75"/><path d="M895 175h75"/></g><text x="102" y="168" class="t">HTML / CSS</text><text x="82" y="195" class="s">DOM 与 CSSOM</text><text x="320" y="168" class="t">渲染树</text><text x="306" y="195" class="s">可见节点 + 样式</text><text x="562" y="168" class="t">布局</text><text x="545" y="195" class="s">位置与尺寸</text><text x="787" y="168" class="t">绘制</text><text x="770" y="195" class="s">绘制指令</text><text x="1006" y="168" class="t">合成</text><text x="1002" y="195" class="s">显示到屏幕</text><text x="60" y="310" class="s">优化重点：减少不必要的布局和绘制，让动画尽量只进入合成阶段。</text></svg>
