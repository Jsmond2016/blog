<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">Flex 与 Grid 的布局选择</title><desc id="desc">Flex 适合沿一条轴排列的导航和工具栏，Grid 适合同时控制行与列的卡片墙。</desc><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:22px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}</style><rect width="1200" height="390" fill="#f8fafc"/><text x="58" y="50" class="t">Flex 管一条轴，Grid 同时管理行和列</text><text x="80" y="105" class="t">Flex：一维排列</text><rect x="80" y="145" width="450" height="100" rx="12" fill="#e0f2fe" stroke="#0284c7" class="b"/><g fill="#fff" stroke="#38bdf8" stroke-width="2"><rect x="105" y="172" width="85" height="45" rx="5"/><rect x="208" y="172" width="85" height="45" rx="5"/><rect x="311" y="172" width="85" height="45" rx="5"/><rect x="414" y="172" width="90" height="45" rx="5"/></g><text x="116" y="200" class="s">Logo</text><text x="224" y="200" class="s">首页</text><text x="327" y="200" class="s">文章</text><text x="430" y="200" class="s">关于</text><text x="100" y="282" class="s">导航、按钮组、局部对齐</text><line x1="600" y1="80" x2="600" y2="330" stroke="#cbd5e1" stroke-width="2"/><text x="670" y="105" class="t">Grid：二维排列</text><rect x="670" y="145" width="420" height="160" rx="12" fill="#f3e8ff" stroke="#9333ea" class="b"/><g fill="#fff" stroke="#c084fc" stroke-width="2"><rect x="695" y="170" width="105" height="45" rx="5"/><rect x="825" y="170" width="105" height="45" rx="5"/><rect x="955" y="170" width="110" height="45" rx="5"/><rect x="695" y="235" width="105" height="45" rx="5"/><rect x="825" y="235" width="105" height="45" rx="5"/><rect x="955" y="235" width="110" height="45" rx="5"/></g><text x="710" y="342" class="s">卡片墙、仪表盘、页面区域</text></svg>
