<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc"><title id="title">TypeScript 类型收窄</title><desc id="desc">未知输入先使用联合类型表示，经过判别字段或运行时检查后，在不同分支中收窄为具体类型。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:21px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="380" fill="#f8fafc"/><text x="55" y="50" class="t">类型收窄：从不确定输入走向可安全使用的具体类型</text><rect x="60" y="135" width="210" height="100" rx="14" fill="#e0f2fe" stroke="#0284c7" class="b"/><text x="101" y="173" class="t">外部输入</text><text x="87" y="205" class="s">API / 表单 / 参数</text><path d="M270 185h115" class="a"/><rect x="390" y="135" width="215" height="100" rx="14" fill="#ffedd5" stroke="#ea580c" class="b"/><text x="430" y="173" class="t">联合类型</text><text x="417" y="205" class="s">success | failure</text><path d="M605 165h115M605 210h115" class="a"/><rect x="725" y="105" width="190" height="90" rx="14" fill="#dcfce7" stroke="#16a34a" class="b"/><rect x="725" y="225" width="190" height="90" rx="14" fill="#fee2e2" stroke="#ef4444" class="b"/><text x="758" y="145" class="t">成功分支</text><text x="750" y="174" class="s">安全读取 data</text><text x="758" y="265" class="t">失败分支</text><text x="750" y="294" class="s">安全读取 message</text><path d="M915 150h115M915 270h115" class="a"/><text x="1038" y="155" class="t">业务处理</text><text x="1038" y="275" class="t">错误提示</text></svg>
