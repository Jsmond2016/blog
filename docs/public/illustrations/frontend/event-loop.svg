<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc"><title id="title">JavaScript 事件循环</title><desc id="desc">同步任务在调用栈执行，调用栈清空后优先执行微任务，再执行一个宏任务，然后循环继续。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:22px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="400" fill="#f8fafc"/><text x="55" y="50" class="t">事件循环：调用栈清空后，先处理微任务</text><rect x="55" y="105" width="230" height="190" rx="14" fill="#e0f2fe" stroke="#0284c7" class="b"/><text x="112" y="150" class="t">调用栈</text><text x="95" y="190" class="s">同步函数与全局脚本</text><rect x="370" y="105" width="270" height="78" rx="14" fill="#ede9fe" stroke="#7c3aed" class="b"/><text x="420" y="138" class="t">微任务队列</text><text x="401" y="164" class="s">Promise.then / queueMicrotask</text><rect x="370" y="220" width="270" height="78" rx="14" fill="#ffedd5" stroke="#ea580c" class="b"/><text x="420" y="253" class="t">宏任务队列</text><text x="406" y="279" class="s">setTimeout / I/O / 事件</text><circle cx="900" cy="202" r="90" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="850" y="194" class="t">事件循环</text><text x="843" y="224" class="s">调用栈为空？</text><path d="M285 200h80M640 144h165M640 259h165" class="a"/><path d="M980 130c145-52 143 162 28 178" class="a"/><text x="1010" y="115" class="s">清空微任务后取一个宏任务</text><text x="55" y="355" class="s">顺序：同步代码 → 全部微任务 → 一个宏任务 → 全部微任务 → …</text></svg>
