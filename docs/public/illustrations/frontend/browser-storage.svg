<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc"><title id="title">浏览器存储选择</title><desc id="desc">Cookie 随请求发送，sessionStorage 在标签页关闭后清除，localStorage 可长期保存少量数据，IndexedDB 适合大量结构化离线数据。</desc><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:22px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}</style><rect width="1200" height="400" fill="#f8fafc"/><text x="55" y="50" class="t">浏览器存储：按生命周期、容量与访问方式选择</text><g class="b"><rect x="55" y="105" width="250" height="190" rx="14" fill="#fee2e2" stroke="#ef4444"/><rect x="335" y="105" width="250" height="190" rx="14" fill="#ffedd5" stroke="#ea580c"/><rect x="615" y="105" width="250" height="190" rx="14" fill="#e0f2fe" stroke="#0284c7"/><rect x="895" y="105" width="250" height="190" rx="14" fill="#ede9fe" stroke="#7c3aed"/></g><text x="135" y="145" class="t">Cookie</text><text x="83" y="182" class="s">会随匹配请求发送</text><text x="83" y="213" class="s">适合：受控会话标识</text><text x="83" y="244" class="s">注意：体积很小，需安全属性</text><text x="390" y="145" class="t">sessionStorage</text><text x="363" y="182" class="s">当前标签页生命周期</text><text x="363" y="213" class="s">适合：临时表单草稿</text><text x="363" y="244" class="s">关闭标签页后清除</text><text x="672" y="145" class="t">localStorage</text><text x="643" y="182" class="s">同源、长期保存</text><text x="643" y="213" class="s">适合：少量界面偏好</text><text x="643" y="244" class="s">同步 API，不存敏感数据</text><text x="955" y="145" class="t">IndexedDB</text><text x="923" y="182" class="s">异步、结构化、大容量</text><text x="923" y="213" class="s">适合：离线数据与缓存</text><text x="923" y="244" class="s">需要设计版本和迁移</text><text x="55" y="350" class="s">共同前提：同源隔离。不要把密码、长期令牌等敏感信息直接放入可被 JavaScript 读取的存储。</text></svg>
