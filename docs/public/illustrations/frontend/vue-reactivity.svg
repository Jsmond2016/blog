<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc"><title id="title">Vue 响应式更新</title><desc id="desc">组件渲染时读取响应式状态建立依赖，状态变化后触发相关计算属性和组件重新执行。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:21px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="380" fill="#f8fafc"/><text x="55" y="50" class="t">Vue 响应式：读取时建立依赖，写入时通知更新</text><rect x="55" y="125" width="200" height="105" rx="14" fill="#e0f2fe" stroke="#0284c7" class="b"/><text x="105" y="165" class="t">响应式状态</text><text x="85" y="197" class="s">ref / reactive</text><path d="M255 178h110" class="a"/><rect x="370" y="125" width="200" height="105" rx="14" fill="#ede9fe" stroke="#7c3aed" class="b"/><text x="417" y="165" class="t">依赖收集</text><text x="397" y="197" class="s">组件渲染时读取</text><path d="M570 178h110" class="a"/><rect x="685" y="125" width="200" height="105" rx="14" fill="#ffedd5" stroke="#ea580c" class="b"/><text x="735" y="165" class="t">派生结果</text><text x="722" y="197" class="s">computed 缓存值</text><path d="M885 178h110" class="a"/><rect x="1000" y="125" width="145" height="105" rx="14" fill="#dcfce7" stroke="#16a34a" class="b"/><text x="1030" y="165" class="t">视图更新</text><text x="1027" y="197" class="s">重新渲染</text><path d="M155 230v65h945v-65" class="a"/><text x="360" y="338" class="s">状态改变后，只通知真正读取过它的计算属性、侦听器和组件副作用。</text></svg>
