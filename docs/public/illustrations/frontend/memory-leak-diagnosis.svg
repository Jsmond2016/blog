<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc"><title id="title">内存泄漏排查流程</title><desc id="desc">重复同一操作并比较堆快照，找到持续增长的对象后，沿保留路径追踪未清理的事件监听器、定时器或缓存引用。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:21px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="390" fill="#f8fafc"/><text x="55" y="50" class="t">内存泄漏：用可复现操作和保留路径定位未释放引用</text><g class="b"><rect x="55" y="135" width="180" height="85" rx="12" fill="#e0f2fe" stroke="#0284c7"/><rect x="300" y="135" width="180" height="85" rx="12" fill="#ffedd5" stroke="#ea580c"/><rect x="545" y="135" width="180" height="85" rx="12" fill="#fee2e2" stroke="#ef4444"/><rect x="790" y="135" width="180" height="85" rx="12" fill="#ede9fe" stroke="#7c3aed"/><rect x="1035" y="135" width="120" height="85" rx="12" fill="#dcfce7" stroke="#16a34a"/></g><g class="a"><path d="M235 177h60"/><path d="M480 177h60"/><path d="M725 177h60"/><path d="M970 177h60"/></g><text x="86" y="168" class="t">复现操作</text><text x="77" y="198" class="s">重复进入/退出页面</text><text x="331" y="168" class="t">录制堆</text><text x="321" y="198" class="s">拍摄多个快照</text><text x="575" y="168" class="t">比较对象</text><text x="570" y="198" class="s">是否持续增长</text><text x="818" y="168" class="t">看保留路径</text><text x="814" y="198" class="s">谁仍在引用</text><text x="1061" y="168" class="t">修复</text><text x="1050" y="198" class="s">清理引用</text><text x="55" y="300" class="s">高频原因：未移除的事件监听器、未清除的定时器、长期缓存，以及闭包引用了已离开的 DOM 或大对象。</text></svg>
