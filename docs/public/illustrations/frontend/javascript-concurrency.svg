<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc"><title id="title">JavaScript 并发控制</title><desc id="desc">任务进入队列，调度器同时只运行指定数量的请求，完成一个任务后再取下一个。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#64748b"/></marker><style>text{font-family:Arial,sans-serif;fill:#172033}.t{font-size:21px;font-weight:bold}.s{font-size:16px;fill:#526077}.b{stroke-width:2}.a{stroke:#64748b;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1200" height="380" fill="#f8fafc"/><text x="55" y="50" class="t">并发控制：限制同时运行的异步任务数量</text><rect x="55" y="120" width="210" height="175" rx="14" fill="#e0f2fe" stroke="#0284c7" class="b"/><text x="110" y="158" class="t">待处理队列</text><g fill="#fff" stroke="#38bdf8" stroke-width="2"><rect x="85" y="180" width="150" height="24" rx="4"/><rect x="85" y="215" width="150" height="24" rx="4"/><rect x="85" y="250" width="150" height="24" rx="4"/></g><path d="M265 208h110" class="a"/><rect x="380" y="120" width="255" height="175" rx="14" fill="#ffedd5" stroke="#ea580c" class="b"/><text x="430" y="158" class="t">调度器</text><text x="410" y="193" class="s">限制：最多 2 个任务</text><text x="423" y="223" class="s">任务完成后补位</text><path d="M635 208h100" class="a"/><rect x="740" y="120" width="160" height="70" rx="12" fill="#ede9fe" stroke="#7c3aed" class="b"/><rect x="740" y="225" width="160" height="70" rx="12" fill="#ede9fe" stroke="#7c3aed" class="b"/><text x="784" y="163" class="t">运行中</text><text x="784" y="268" class="t">运行中</text><path d="M900 155h125M900 260h125" class="a"/><rect x="1030" y="170" width="115" height="100" rx="12" fill="#dcfce7" stroke="#16a34a" class="b"/><text x="1051" y="212" class="t">完成</text><text x="1048" y="242" class="s">或失败</text><text x="55" y="345" class="s">适用：批量上传、分页预取、批量请求。并发数应根据接口能力、网络和用户体验调整。</text></svg>
